/* ============================================================

   ------------------------------------------------------------

     • canvas + DPR + resize/layout
     • игровой цикл (loop/update/render)
     • ввод: pointer (tap/swipe) + клавиатура
     • звук (beep), частицы (burst)
     • загрузка base64-ассетов
     • тематический HUD (счёт + полоса таймера) и экран Game Over
     • ПРОТОКОЛ Sharky (postMessage): принимает init/start/pause,
       шлёт ready/score/gameover; автостарт ВНЕ ленты по таймеру.

   Игра = это ядро + один МОДУЛЬ-СЦЕНА (механика, регистрируется
   через Engine.register) + объект CONFIG (тема/правила/ассеты).
   Сборщик (build.js) встраивает все три части в один .html —
   игры в Sharky крутятся в sandbox-iframe через srcdoc, поэтому
   внешние <script> и относительные ассеты недопустимы.

   ── КОНТРАКТ СЦЕНЫ ──
   Engine.register('genre', function(engine, cfg){
     return {
       init(){},          // одноразовая настройка (ассеты+геометрия готовы)
       reset(){},         // (пере)собрать игровое состояние; на каждый запуск
       layout(L){},       // пересчёт геометрии из {W,H,headerH}
       update(dt){},      // продвинуть механику (таймер ведёт ЯДРО)
       render(ctx){},     // нарисовать поле (фон/HUD/оверлей рисует ЯДРО)
       pointerDown(p){},  // p = {x,y} в пикселях canvas
       pointerUp(e){},    // e = {x,y,downX,downY,dx,dy,dist,dir}
       pointerMove(p){},
       key(k){},          // k = event.key
     };
   });

   ── API ЯДРА для сцены (engine.*) ──
     ctx, W, H, headerH, cfg, theme, rules, score   (только чтение)
     img(name) -> HTMLImageElement
     beep(freq,dur,type,vol)
     burst(x,y,opts)                  // частицы (по умолчанию — как в match3)
     addScore(n) / setScore(v)        // меняет счёт + шлёт его в ленту
     gameOver()                       // завершить забег (смерть). Таймер тоже завершает.

   ============================================================ */
(function (global) {
  'use strict';

  let cv, ctx;
  let W = 360, H = 580, headerH = 70, dpr = 1;

  // ── конфиг / сцена ──
  let cfg = null, theme = {}, rules = {}, scene = null;

  // ── состояние забега ──
  let state = 'loading';            // loading | playing | over
  let running = false, raf = 0, last = 0;
  let score = 0, best = 0, timeLeft = 0, duration = 0, timed = false;
  let assetsReady = false, pendingStart = false, gotShell = false;
  let savedState = null;            // прогресс, присланный лентой в init (или null)

  // ── ассеты ──
  const IMG = {}; let imgTotal = 0, imgLoaded = 0;

  // ── звук ──
  let audioCtx = null;

  // ── частицы ──
  const parts = [];

  // ── ввод ──
  let downX = 0, downY = 0, hasDown = false;
  const pointers = {};        // pointerId → {x,y} точки нажатия (мультитач)
  const keys = new Set();     // зажатые клавиши (для платформеров и т.п.)
  const GAME_KEYS = [' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];

  /* ═══════════ CONTROLS: универсальный слой управления (CONFIG.controls) ═══════════
     Все схемы транслируются в ВИРТУАЛЬНЫЕ КЛАВИШИ → работают с любой сценой.
     controls = {
       scheme: 'joystick' | 'tapmove' | 'tapaction' | 'aim' | null(=только кнопки),
       joystick: { side:'left', radius:0.09, deadzone:0.3 },
       tapAction: 'jump',                     — что делает тап (схема tapaction)
       aim: { fire:'attack' | false },        — держишь палец/мышь = огонь в ту сторону
       buttons: [ {glyph:'▲', action:'jump'} | {glyph:'✕', key:'x'} … ]  — программируемые
     }
     Действие → клавиша: */
  const ACT2KEY = { left: 'ArrowLeft', right: 'ArrowRight', up: 'ArrowUp', down: 'ArrowDown',

    playerScreen: null, scheme: null };
  let ctlCfg = null, ctlBtns = [], joy = null, tapTarget = null, ctlHeld = {};
  function actKey(b) { return b.key || ACT2KEY[b.action] || ' '; }
  function ctlPress(key) { if (!keys.has(key)) { keys.add(key); if (scene && scene.key) scene.key(key); } }
  function ctlRelease(key) { keys.delete(key); }
  function initControls(c) {
    ctlCfg = c || null;
    if (!ctlCfg) return;
    CTL.scheme = ctlCfg.scheme || null;
    layoutCtlButtons();
  }
  function layoutCtlButtons() {
    ctlBtns = [];
    if (!ctlCfg || !ctlCfg.buttons) return;
    const r = Math.min(W, H) * 0.075, m = r * 0.7;
    for (let i = 0; i < ctlCfg.buttons.length; i++) {
      const b = ctlCfg.buttons[i];
      // свои координаты (в долях экрана) или авто-дуга справа снизу
      const x = b.x != null ? b.x * W : W - m - r - (i % 2) * (r * 2.3);
      const y = b.y != null ? b.y * H : H - m - r - Math.floor(i / 2) * (r * 2.3);
      ctlBtns.push({ x: x, y: y, r: b.r ? b.r * Math.min(W, H) : r, glyph: b.glyph || '●', key: actKey(b), id: i });
    }

  function ctlDown(p) {   // true = событие съедено слоем управления
    if (!ctlCfg) return false;
    for (let i = 0; i < ctlBtns.length; i++) {
      const b = ctlBtns[i];
      if ((p.x - b.x) * (p.x - b.x) + (p.y - b.y) * (p.y - b.y) <= b.r * b.r * 1.45) {
        ctlHeld[p.id] = b.key; ctlPress(b.key); return true;
      }
    }
    const sch = CTL.scheme;
    if (sch === 'joystick') {
      const side = (ctlCfg.joystick && ctlCfg.joystick.side) || 'left';
      const inZone = side === 'any' || (side === 'left' ? p.x < W * 0.55 : p.x > W * 0.45);
      if (inZone && !joy) { joy = { id: p.id, cx: p.x, cy: p.y }; return true; }
      return false;
    }
    if (sch === 'tapmove') { tapTarget = { x: p.x, y: p.y, id: p.id }; return true; }
    if (sch === 'tapaction') {
      const key = ACT2KEY[ctlCfg.tapAction || 'jump'] || ' ';
      ctlHeld[p.id] = key; ctlPress(key); return true;
    }
    if (sch === 'aim') {
      CTL.aim.x = p.x; CTL.aim.y = p.y; CTL.aim.active = true;
      const f = ctlCfg.aim && ctlCfg.aim.fire;
      if (f !== false) { ctlHeld[p.id] = ACT2KEY[f || 'attack'] || 'x'; ctlPress(ctlHeld[p.id]); }
      return true;
    }
    return false;
  }
  function ctlMove(p) {
    CTL.mouse.x = p.x; CTL.mouse.y = p.y;
    if (!ctlCfg) return;
    if (joy && p.id === joy.id) {
      const R = ((ctlCfg.joystick && ctlCfg.joystick.radius) || 0.09) * Math.min(W, H);
      const dz = (ctlCfg.joystick && ctlCfg.joystick.deadzone) || 0.3;
      let dx = (p.x - joy.cx) / R, dy = (p.y - joy.cy) / R;
      const len = Math.hypot(dx, dy);
      if (len > 1) { dx /= len; dy /= len; }
      CTL.axis.x = dx; CTL.axis.y = dy;
      joy.dx = dx; joy.dy = dy;
      // 8-way → клавиши
      (dx < -dz ? ctlPress : ctlRelease)('ArrowLeft');
      (dx > dz ? ctlPress : ctlRelease)('ArrowRight');
      (dy < -dz ? ctlPress : ctlRelease)('ArrowUp');
      (dy > dz ? ctlPress : ctlRelease)('ArrowDown');
    }
    if (CTL.scheme === 'aim' && CTL.aim.active) { CTL.aim.x = p.x; CTL.aim.y = p.y; }
    if (CTL.scheme === 'tapmove' && tapTarget && p.id === tapTarget.id) { tapTarget.x = p.x; tapTarget.y = p.y; }
  }
  function ctlUp(p) {
    if (!ctlCfg) return false;
    let ate = false;
    if (ctlHeld[p.id]) { ctlRelease(ctlHeld[p.id]); delete ctlHeld[p.id]; ate = true; }
    if (joy && p.id === joy.id) {
      joy = null; CTL.axis.x = 0; CTL.axis.y = 0;
      ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].forEach(ctlRelease);
      ate = true;
    }
    if (CTL.scheme === 'aim') { CTL.aim.active = false; ate = true; }

  // tap-to-move: каждый кадр сравниваем цель с экранной позицией персонажа
  // (сцена сообщает её через engine.reportPlayerScreen)
  function ctlUpdate() {
    if (!ctlCfg || CTL.scheme !== 'tapmove') return;
    if (!tapTarget || !CTL.playerScreen) {
      if (!tapTarget) { ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].forEach(ctlRelease); }
      return;
    }
    const px = CTL.playerScreen.x, py = CTL.playerScreen.y;
    const dx = tapTarget.x - px, dy = tapTarget.y - py;
    const dead = Math.min(W, H) * 0.04;
    (dx < -dead ? ctlPress : ctlRelease)('ArrowLeft');
    (dx > dead ? ctlPress : ctlRelease)('ArrowRight');
    (dy < -dead * 2.2 ? ctlPress : ctlRelease)('ArrowUp');     // вверх — с большим порогом (прыжок/лестницы)

  function drawControls() {

    // кнопки

        ctx.beginPath(); ctx.arc(joy.cx, joy.cy, R, 0, 7); ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.beginPath(); ctx.arc(joy.cx + (joy.dx || 0) * R, joy.cy + (joy.dy || 0) * R, R * 0.42, 0, 7); ctx.fill();
      } else {

        const gx = side === 'right' ? W * 0.78 : W * 0.22, gy = H * 0.82;
        ctx.strokeStyle = 'rgba(255,255,255,0.14)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(gx, gy, R, 0, 7); ctx.stroke();

    }
    // маркер tap-to-move
    if (CTL.scheme === 'tapmove' && tapTarget) {
      ctx.strokeStyle = 'rgba(255,255,255,' + (0.5 + Math.sin(Date.now() / 130) * 0.3) + ')';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(tapTarget.x, tapTarget.y, 12, 0, 7); ctx.stroke();
      ctx.beginPath(); ctx.arc(tapTarget.x, tapTarget.y, 3, 0, 7); ctx.fill();
    }
    // прицел aim
    if (CTL.scheme === 'aim' && CTL.aim.active) {
      ctx.strokeStyle = 'rgba(255,120,120,0.85)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(CTL.aim.x, CTL.aim.y, 11, 0, 7); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(CTL.aim.x - 16, CTL.aim.y); ctx.lineTo(CTL.aim.x + 16, CTL.aim.y);

  const api = {
    get ctx() { return ctx; },
    get W() { return W; },
    get H() { return H; },
    get headerH() { return headerH; },
    get cfg() { return cfg; },
    get theme() { return theme; },
    get rules() { return rules; },
    get score() { return score; },
    get timeLeft() { return timeLeft; },

  // ── caves: спеланки-лайт генерация из комнат ──
  function cavesReset() {
    const G = GENC, gw = G.gridW || 3, gh = G.gridH || 3, rw = G.roomW, rh = G.roomH;
    // 1) путь сверху вниз
    const type = []; for (let r = 0; r < gh; r++) { type[r] = []; for (let c = 0; c < gw; c++) type[r][c] = 'X'; }
    let col = (Math.random() * gw) | 0, row = 0;
    const startCol = col;
    type[0][col] = 'LR';
    while (row < gh) {
      const dir = Math.random() < 0.5 ? -1 : 1;
      let steps = 1 + ((Math.random() * gw) | 0);
      while (steps-- > 0) {
        const nc = col + dir;
        if (nc < 0 || nc >= gw || Math.random() < 0.3) break;
        col = nc; if (type[row][col] === 'X') type[row][col] = 'LR';
      }
      if (row === gh - 1) break;
      type[row][col] = (type[row][col] === 'LRU') ? 'LRUD' : 'LRD';
      row++;
      type[row][col] = 'LRU';
    }
    const endCol = col;
    // 2) собрать карту из шаблонов (+рамка из сплошного тайла)

    const rows = [];
    for (let r = 0; r < gh; r++) {
      for (let y = 0; y < rh; y++) {
        let line = solidCh;
        for (let c = 0; c < gw; c++) {
          const pool = G.rooms[type[r][c]] && G.rooms[type[r][c]].length ? G.rooms[type[r][c]] : G.rooms.X;
          const tpl = pool[cavesPick(r, c, pool.length)];   // детерминированный выбор в рамках прогона
          line += (tpl[y] || '').padEnd(rw, ' ').slice(0, rw);
        }
        rows.push(line + solidCh);
      }
    }
    rows.unshift(solidCh.repeat(gw * rw + 2));
    rows.push(solidCh.repeat(gw * rw + 2));

  }
  let _cavesSeed = 0;
  function cavesPick(r, c, n) { return Math.abs((r * 73856093) ^ (c * 19349663) ^ _cavesSeed) % n; }
  // найти свободную клетку с опорой в комнате (rc,rr) и вписать символ
  function injectChar(rows, rc, rr, rw, rh, ch) {
    const x0 = 1 + rc * rw, y0 = 1 + rr * rh;
    for (let y = y0 + rh - 2; y >= y0; y--) for (let x = x0 + 1; x < x0 + rw - 1; x++) {
      const below = rows[y + 1] && rows[y + 1][x];
      const here = rows[y][x];
      if (here === ' ' && below && L(below) && L(below).solid) {
        rows[y] = rows[y].slice(0, x) + ch + rows[y].slice(x + 1);
        return;
      }
    }
    // фолбэк: центр комнаты
    const cx = x0 + (rw >> 1), cy = y0 + (rh >> 1);
    rows[cy] = rows[cy].slice(0, cx) + ch + rows[cy].slice(cx + 1);
  }

  function loadLevel() {
    collected = {}; openedDoors = {};
    if (MODE === 'runner') { runnerReset(); }
    else if (MODE === 'caves') { _cavesSeed = (Math.random() * 1e9) | 0; cavesReset(); }
    else buildDesigned(LEVELS[levelIdx].map);
    // челленджи уровня: без урона / все монеты / скорость
    chTrack = { damaged: false, coins0: ents.filter(e => e.kind === 'pickup' && e.def.pickup === 'coin').length, t0: time };
  }
  function levelChallenges() {
    const lvl = LEVELS[levelIdx];
    return (lvl && lvl.challenges) || P.challenges || null;
  }
  function awardChallenges() {
    const list = levelChallenges();
    if (!list || !chTrack) return;
    const coinsLeft = ents.filter(e => e.kind === 'pickup' && e.def.pickup === 'coin' && !e.dead).length;
    for (let i = 0; i < list.length; i++) {
      const ch = list[i];
      let ok = false;
      if (ch.type === 'noDamage') ok = !chTrack.damaged;
      else if (ch.type === 'allCoins') ok = chTrack.coins0 > 0 && coinsLeft === 0;
      else if (ch.type === 'fast') ok = (time - chTrack.t0) <= (ch.time || 60);
      if (ok) {
        addScore(ch.score || 100);
        if (ch.star) { stars++; toast('⭐ ' + (ch.label || ch.type)); }   // скрытая звезда Марио
        else toast('✔ ' + (ch.label || ch.type) + ' +' + (ch.score || 100));
        sfx('power');
      }
    }
  }
  // ── roguelite: выбор из 3 случайных апгрейдов (пауза геймплея) ──
  function pickUpgrades() {
    const pool = (ROGUE.choices || []).slice();
    const out = [];
    while (out.length < 3 && pool.length) out.push(pool.splice((Math.random() * pool.length) | 0, 1)[0]);
    return out.length ? out : null;
  }
  function applyUpgrade(u) {
    const p = player;
    if (u.hp) p.hp = Math.min(p.maxHp, p.hp + u.hp);
    if (u.maxHp) { p.maxHp += u.maxHp; p.hp += u.maxHp; }
    if (u.dmgMul) p.mods.dmg *= u.dmgMul;
    if (u.speedMul) p.mods.speed *= u.speedMul;
    if (u.life) lives += u.life;
    if (u.ability) p.abilities[u.ability] = true;
    toast(u.label || 'Апгрейд!'); sfx('power');
  }

  // ════════════════════════════════ ФИЗИКА
  function moveBody(e, dt, opts) {
    opts = opts || {};
    e.onGround = false; e.hitWall = 0;
    const maxV = Math.max(Math.abs(e.vx), Math.abs(e.vy));
    const steps = Math.max(1, Math.ceil((maxV * dt) / (TS * 0.6)));
    const sdt = dt / steps;
    for (let i = 0; i < steps; i++) moveStep(e, sdt, opts);
  }
  function moveStep(e, dt, opts) {
    // X
    if (e.vx !== 0) {
      let nx = e.x + e.vx * dt;
      const dir = e.vx > 0 ? 1 : -1;
      const edge = dir > 0 ? nx + e.w : nx;
      const tx = Math.floor(edge / TS);
      const ty0 = Math.floor(e.y / TS), ty1 = Math.floor((e.y + e.h - 0.5) / TS);
      let hit = false;
      for (let ty = ty0; ty <= ty1; ty++) if (solidAt(tx, ty)) { hit = true; break; }
      if (hit) { nx = dir > 0 ? tx * TS - e.w - 0.01 : (tx + 1) * TS + 0.01; e.vx = 0; e.hitWall = dir; }
      e.x = nx;
    }
    // Y (gdir=1 — обычная гравитация; -1 — перевёрнутая, «пол» на потолке)
    const gd = e.gdir || 1;
    const prevBottom = e.y + e.h;
    if (e.vy !== 0) {
      let ny = e.y + e.vy * dt;
      const tx0 = Math.floor(e.x / TS), tx1 = Math.floor((e.x + e.w - 0.5) / TS);
      const falling = e.vy * gd > 0;
      if (falling) {
        const ty = gd > 0 ? Math.floor((ny + e.h) / TS) : Math.floor(ny / TS);
        let land = false;
        for (let tx = tx0; tx <= tx1; tx++) {
          if (solidAt(tx, ty)) { land = true; break; }
          const d = defAt(tx, ty);
          if (gd > 0 && d && d.oneWay && !opts.noOneWay && !e.drop && prevBottom <= ty * TS + 2) { land = true; break; }
        }
        if (land) {
          ny = gd > 0 ? ty * TS - e.h - 0.01 : (ty + 1) * TS + 0.01;
          e.vy = 0; e.onGround = true;
        }
      } else {
        const ty = gd > 0 ? Math.floor(ny / TS) : Math.floor((ny + e.h) / TS);
        let bump = false;
        for (let tx = tx0; tx <= tx1; tx++) if (solidAt(tx, ty)) {
          bump = true;
          if (opts.bumper) bumpTile(tx, ty);   // блоки Марио — только игрок
          break;
        }
        if (bump) { ny = gd > 0 ? (ty + 1) * TS + 0.01 : ty * TS - e.h - 0.01; e.vy = 0; }
      }
      e.y = ny;
    }
  }
  function overlap(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }
  function onLadder(e) {
    const tx = Math.floor((e.x + e.w / 2) / TS);
    const ty0 = Math.floor(e.y / TS), ty1 = Math.floor((e.y + e.h) / TS);
    for (let ty = ty0; ty <= ty1; ty++) {
      const d = defAt(tx, ty);
      if ((d && d.ladder) || ropeTiles[tx + ',' + ty]) return true;
    }
    return false;
  }

  // ════════════════════════════════ ВВОД
  function inp() {
    const k = engine.keys;
    return {
      left:  k.has('ArrowLeft') || k.has('a') || k.has('A') || vkeys.left,
      right: k.has('ArrowRight') || k.has('d') || k.has('D') || vkeys.right,
      up:    k.has('ArrowUp') || k.has('w') || k.has('W') || vkeys.up,
      down:  k.has('ArrowDown') || k.has('s') || k.has('S') || vkeys.down,
      jump:  k.has(' ') || k.has('z') || k.has('Z') || k.has('k') || k.has('K') || k.has('ArrowUp') || k.has('w') || k.has('W') || vkeys.jump,
      atk:   k.has('x') || k.has('X') || k.has('j') || k.has('J') || vkeys.atk,
      dash:  k.has('c') || k.has('C') || k.has('l') || k.has('L') || k.has('Shift') || vkeys.dash,
      swap:  k.has('q') || k.has('Q') || vkeys.swap,
      hook:  k.has('v') || k.has('V') || k.has('b') || k.has('B') || vkeys.hook,
      slow:  k.has('g') || k.has('G') || vkeys.slow,
      map:   k.has('m') || k.has('M') || vkeys.map,
    };
  }
  function pressed(cur, name) { return cur[name] && !prevIn[name]; }

  // ════════════════════════════════ ИГРОК
  function stam() { return PLDEF.stamina; }
  function useStamina(cost) {
    if (!stam()) return true;
    if (player.stamina < cost) return false;
    player.stamina -= cost; return true;
  }
  function updatePlayer(dt, cur) {
    const p = player;
    if (stam()) p.stamina = Math.min(stam().max, p.stamina + stam().regen * dt);
    p.inv = Math.max(0, p.inv - dt);
    p.attackT = Math.max(0, p.attackT - dt);
    p.shootT = Math.max(0, p.shootT - dt);
    if (p.tempWeapon) { p.tempWeapon.t -= dt; if (p.tempWeapon.t <= 0) { p.tempWeapon = null; sfx('swap'); } }
    p.attackCd = Math.max(0, p.attackCd - dt);
    p.dashCd = Math.max(0, p.dashCd - dt);
    p.coyote = Math.max(0, p.coyote - dt);
    p.buffer = Math.max(0, p.buffer - dt);

    const auto = MODE === 'runner';
    const wantL = !auto && cur.left, wantR = auto || cur.right;

    // ── раннер-полосы (Subway Surfers): 3 дорожки, свайпы ↑/↓ ──
    if (auto && RUN.lanes) {
      const rows = RUN.lanes.rows || [3, 6, 9];
      if (p.lane == null) p.lane = (rows.length / 2) | 0;
      const tyL = rows[p.lane] * TS - p.h;
      p.vy = 0; p.y += (tyL - p.y) * Math.min(1, dt * 12);
      p.vx = runnerSpeed;
      moveBody(p, dt, { noOneWay: true });
      if (p.hitWall) { killPlayer(); return; }   // врезался в препятствие
      return afterMove(dt);
    }

    // ── подкат (раннер): свайп вниз / удержание down ──
    if (auto) {
      const baseH = PLDEF.h * TS;
      if (p.slideT > 0) {
        p.slideT -= dt;
        if (p.slideT <= 0 && p.h < baseH) { p.y -= baseH - p.h; p.h = baseH; }
      } else if ((cur.down || p.slideReq) && p.onGround && p.h >= baseH) {
        p.slideT = 0.6; const nh = baseH * 0.55;
        p.y += p.h - nh; p.h = nh; sfx('dash');
      }
      p.slideReq = false;
    }

    // ── крюк-кошка (Dead Cells): полёт к точке / вис ──
    if (p.grap) {
      if (pressed(cur, 'jump')) {           // отцеп с прыжком
        p.grap = null; p.vy = -PH.jumpVel * 0.9 * p.gdir; p.jumps = 1; sfx('jump');
      } else if (cur.down) { p.grap = null; }  // просто отпустить
      else {
        const gx = (p.grap.tx + 0.5) * TS - p.w / 2, gy = (p.grap.ty + 0.9) * TS;
        const dx = gx - p.x, dy = gy - p.y, dist = Math.hypot(dx, dy);
        if (dist < 6 || p.grap.hang) { p.grap.hang = true; p.x = gx; p.y = gy; p.vx = 0; p.vy = 0; }
        else {
          const sp = PH.grappleSpeed || 380;
          p.vx = dx / dist * sp; p.vy = dy / dist * sp;
          const px = p.x, py = p.y;
          moveBody(p, dt, { noOneWay: true });
          if (p.hitWall || (p.x === px && p.y === py)) p.grap = null;   // упёрлись
        }
        return afterMove(dt);
      }
    }
    if (pressed(cur, 'hook') && ab('grapple') && !p.grap) {
      // ближайшая grapple-точка в радиусе, предпочтительно выше и по взгляду
      const R = (PH.grappleRange || 7) * TS;
      const pcx = p.x + p.w / 2, pcy = p.y + p.h / 2;
      let best = null;
      const tx0 = Math.floor((pcx - R) / TS), tx1 = Math.floor((pcx + R) / TS);
      const ty0 = Math.floor((pcy - R) / TS), ty1 = Math.floor((pcy + 2 * TS) / TS);
      for (let ty = ty0; ty <= ty1; ty++) for (let tx = tx0; tx <= tx1; tx++) {
        const d = defAt(tx, ty); if (!d || !d.grapple) continue;
        const cx = (tx + 0.5) * TS, cy2 = (ty + 0.5) * TS;
        let score = Math.hypot(cx - pcx, cy2 - pcy);
        if (score > R) continue;
        if ((cx - pcx) * p.facing < 0) score += TS * 3;    // сзади — штраф
        if (cy2 > pcy) score += TS * 2;                    // ниже — штраф
        if (!best || score < best.score) best = { tx: tx, ty: ty, score: score };
      }
      if (best) { p.grap = { tx: best.tx, ty: best.ty, hang: false }; p.pound = false; p.climbing = false; sfx('dash'); }
    }

    // ── граунд-паунд (Rayman): рывок вниз в полёте ──
    if (p.pound) {
      p.vx = 0; p.vy = (PH.poundSpeed || 620) * p.gdir;
      moveBody(p, dt);
      if (p.onGround) {
        p.pound = false;
        shake(6, 0.3); sfx('slam');
        burstAt(p.x + p.w / 2, p.y + p.h, { count: 14 });
        const R2 = (PH.poundRadius || 2.4) * TS;
        for (let i = 0; i < ents.length; i++) {
          const e = ents[i];
          if (e.kind === 'enemy' && !e.dead && !e.boss &&
              Math.abs(e.x + e.w / 2 - (p.x + p.w / 2)) < R2 && Math.abs(e.y - p.y) < TS * 2.5)
            damageEnemy(e, PH.poundDmg || 2, Math.sign(e.x - p.x) * 200);
        }
        // ломаем breakable-тайлы под ударом
        const bty = Math.floor((p.gdir > 0 ? p.y + p.h + 2 : p.y - 2) / TS);
        for (let btx = Math.floor((p.x - 4) / TS); btx <= Math.floor((p.x + p.w + 4) / TS); btx++) {
          const d = defAt(btx, bty);
          if (d && d.breakable && solidAt(btx, bty)) {
            openedDoors['b' + btx + ',' + bty] = true;
            burstAt((btx + 0.5) * TS, (bty + 0.5) * TS, { count: 8, color: d.color });
          }
        }
      }
      return afterMove(dt);
    }
    if (pressed(cur, 'down') && !p.onGround && ab('groundPound') && !p.climbing && !p.grap) {
      p.pound = true; p.dashT = 0; sfx('swing');
    }

    // ── дэш / перекат ──
    if (p.dashT > 0) {
      p.dashT -= dt;
      p.vy = 0;
      moveBody(p, dt);
      if (p.dashT <= 0) p.vx = 0;
      return afterMove(dt);
    }
    if (pressed(cur, 'dash') && ab('dash') && p.dashCd <= 0 && useStamina(stam() ? stam().dashCost : 0)) {
      p.dashT = PH.dashTime; p.dashCd = 0.5; p.vx = PH.dashSpeed * p.facing;
      if (PLDEF.dashIFrames) p.inv = Math.max(p.inv, PH.dashTime + 0.08);
      sfx('dash');
      moveBody(p, dt);
      return afterMove(dt);
    }

    // ── лестницы ──
    if (p.climbing) {
      if (!onLadder(p) || pressed(cur, 'jump')) { p.climbing = false; }
      else {
        p.vx = (wantL ? -1 : wantR ? 1 : 0) * PH.moveSpeed * 0.6;
        p.vy = (cur.up ? -1 : cur.down ? 1 : 0) * PH.climbSpeed;
        moveBody(p, dt, { noOneWay: cur.down });
        return afterMove(dt);
      }
    } else if ((cur.up || cur.down) && onLadder(p)) {
      p.climbing = true; p.vy = 0; p.jumps = 0;
    }

    // ── горизонталь (+ костюм, конвейер, ускоритель) ──
    const sd = suitDef();
    let spdMul = p.mods.speed * ((sd && sd.speedMul) || 1);
    if (p.onGround) {
      const fty = Math.floor((p.gdir > 0 ? p.y + p.h + 2 : p.y - 2) / TS);
      for (let ftx = Math.floor(p.x / TS); ftx <= Math.floor((p.x + p.w - 0.5) / TS); ftx++) {
        const fd = defAt(ftx, fty);
        if (fd && fd.conveyor) p.x += fd.conveyor * dt;   // конвейерная лента
        if (fd && fd.boost) spdMul *= fd.boost;           // ускоряющая платформа
      }
    }
    const targetV = auto ? runnerSpeed : ((wantL ? -1 : 0) + (wantR ? 1 : 0)) * PH.moveSpeed * spdMul;
    const ctl = p.onGround ? 1 : PH.airControl;
    if (targetV !== 0) {
      p.vx += Math.sign(targetV - p.vx) * PH.accel * ctl * dt;
      if (Math.sign(targetV) === Math.sign(p.vx) && Math.abs(p.vx) > Math.abs(targetV)) p.vx = targetV;
      p.facing = targetV > 0 ? 1 : -1;
    } else {
      const f = PH.friction * ctl * dt;
      if (Math.abs(p.vx) <= f) p.vx = 0; else p.vx -= Math.sign(p.vx) * f;

    // ── прыжок: coyote + buffer + double + wall (или гравифлип VVVVVV) ──

    const sliding = !p.onGround && p.hitWallStick && ab('wallJump') && p.vy * p.gdir > 0;
    if (p.buffer > 0) {
      if (ab('gravityFlip')) {
