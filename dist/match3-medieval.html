/* ============================================================
   SHARKY GAME ENGINE — universal core (core.js)
   ------------------------------------------------------------
   Общий слой для всех мини-игр ленты Sharky:
     • canvas + DPR + resize/layout
     • игровой цикл (loop/update/render)
     • ввод: pointer (tap/swipe) + клавиатура
     • звук (beep), частицы (burst)
     • загрузка base64-ассетов
     • тематический HUD (счёт + полоса таймера) и экран Game Over
     • ПРОТОКОЛ Sharky (postMessage): принимает init/start/pause,
       шлёт ready/score/gameover; автостарт ВНЕ ленты по таймеру.

   Игра = это ядро + один МОДУЛЬ-СЦЕНА (механика, регистрируется
   через Engine.register) + объект CONFIG (тема/правила/ассеты).
   Сборщик (build.js) встраивает все три части в один .html —
   игры в Sharky крутятся в sandbox-iframe через srcdoc, поэтому
   внешние <script> и относительные ассеты недопустимы.

   ── КОНТРАКТ СЦЕНЫ ──
   Engine.register('genre', function(engine, cfg){
     return {
       init(){},          // одноразовая настройка (ассеты+геометрия готовы)
       reset(){},         // (пере)собрать игровое состояние; на каждый запуск
       layout(L){},       // пересчёт геометрии из {W,H,headerH}
       update(dt){},      // продвинуть механику (таймер ведёт ЯДРО)
       render(ctx){},     // нарисовать поле (фон/HUD/оверлей рисует ЯДРО)
       pointerDown(p){},  // p = {x,y} в пикселях canvas
       pointerUp(e){},    // e = {x,y,downX,downY,dx,dy,dist,dir}
       pointerMove(p){},
       key(k){},          // k = event.key
     };
   });

   ── API ЯДРА для сцены (engine.*) ──
     ctx, W, H, headerH, cfg, theme, rules, score   (только чтение)
     img(name) -> HTMLImageElement
     beep(freq,dur,type,vol)
     burst(x,y,opts)                  // частицы (по умолчанию — как в match3)
     addScore(n) / setScore(v)        // меняет счёт + шлёт его в ленту
     gameOver()                       // завершить забег (смерть). Таймер тоже завершает.
     rr(x,y,w,h,r) / accent()         // помощники рисования
   ============================================================ */
(function (global) {
  'use strict';

  // ── canvas / контекст ──
  let cv, ctx;
  let W = 360, H = 580, headerH = 70, dpr = 1;

  // ── конфиг / сцена ──
  let cfg = null, theme = {}, rules = {}, scene = null;

  // ── состояние забега ──
  let state = 'loading';            // loading | playing | over
  let running = false, raf = 0, last = 0;
  let score = 0, best = 0, timeLeft = 0, duration = 0, timed = false;
  let assetsReady = false, pendingStart = false, gotShell = false;

  // ── ассеты ──
  const IMG = {}; let imgTotal = 0, imgLoaded = 0;

  // ── звук ──
  let audioCtx = null;

  // ── частицы ──
  const parts = [];

  // ── ввод ──
  let downX = 0, downY = 0, hasDown = false;

  // ── объект, который получает сцена ──
  const api = {
    get ctx() { return ctx; },
    get W() { return W; },
    get H() { return H; },
    get headerH() { return headerH; },
    get cfg() { return cfg; },
    get theme() { return theme; },
    get rules() { return rules; },
    get score() { return score; },
    get timeLeft() { return timeLeft; },
    get duration() { return duration; },
    img: function (name) { return IMG[name]; },
    beep: beep,
    burst: burst,
    addScore: addScore,
    setScore: setScore,
    gameOver: gameOver,
    resetTimer: resetTimer,
    rr: rr,
    accent: accent,
  };

  const Engine = {
    scenes: {},
    register: function (name, factory) { this.scenes[name] = factory; },
    boot: boot,
  };
  global.Engine = Engine;

  // Диагностика (можно дёрнуть из консоли): текущее состояние движка.
  Engine.debug = function () {
    return { state: state, running: running, assetsReady: assetsReady, pendingStart: pendingStart,
             gotShell: gotShell, imgLoaded: imgLoaded, imgTotal: imgTotal, hasScene: !!scene,
             W: W, H: H };
  };

  // ════════════════════════════════════════════ BOOT
  function boot(config) {
    cfg = config; theme = config.theme || {}; rules = config.rules || {};
    duration = rules.duration || 60;
    timed = (rules.mode || 'timed') === 'timed';
    cv = document.getElementById('c'); ctx = cv.getContext('2d');
    if (theme.accent) document.documentElement.style.setProperty('--ac', theme.accent);
    if (theme.bgBottom || theme.bgTop) document.body.style.background = theme.bgBottom || theme.bgTop;

    const factory = Engine.scenes[config.genre];
    if (!factory) { console.error('Engine: нет сцены для жанра', config.genre); return; }
    scene = factory(api, config);
    Engine._scene = scene;   // для отладки/тестов

    window.addEventListener('resize', resize);
    bindInput();
    bindProtocol();
    window.addEventListener('load', function () {
      loadImages(config.assets || {});
      // Автостарт ТОЛЬКО вне Sharky. В ленте всегда приходит init -> gotShell=true.
      setTimeout(function () {
        if (!gotShell) { if (assetsReady) start(); else pendingStart = true; }
      }, 400);
    });
  }

  // ════════════════════════════════════════════ ГЕОМЕТРИЯ
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = cv.clientWidth || 360; H = cv.clientHeight || 580;
    cv.width = Math.round(W * dpr); cv.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;            // чёткий пиксель-арт
    headerH = Math.max(48, Math.min(96, H * 0.13));
    if (scene && scene.layout) scene.layout({ W: W, H: H, headerH: headerH });
  }

  // ════════════════════════════════════════════ АССЕТЫ
  function loadImages(map) {
    const names = Object.keys(map);
    imgTotal = names.length; imgLoaded = 0;
    if (imgTotal === 0) { onReady(); return; }
    names.forEach(function (n) {
      const im = new Image();
      im.onload = im.onerror = function () { imgLoaded++; if (imgLoaded >= imgTotal) onReady(); };
      const v = map[n];
      // поддержка готовых data-URL (jpg/webp/png) и «сырого» base64 (по умолч. png)
      im.src = (typeof v === 'string' && v.lastIndexOf('data:', 0) === 0) ? v : ('data:image/png;base64,' + v);
      IMG[n] = im;
    });
  }
  function onReady() {
    resize();
    try {
      if (scene.init) scene.init();
      newRun();
    } catch (e) { console.error('Engine onReady scene error:', e); }
    assetsReady = true;
    try { const v = getComputedStyle(document.documentElement).getPropertyValue('--ac').trim(); if (v) theme.accent = v; } catch (e) {}
    send({ type: 'ready' });
    if (pendingStart) start();
  }

    const W = engine.W, headerH = engine.headerH;
    const font = (cfg.theme && cfg.theme.font) || 'sans-serif';
    const hudText = (cfg.theme && cfg.theme.hudText) || '#fff';
    const ac = engine.accent();
    const cy = headerH / 2;
    ctx.fillStyle = 'rgba(0,0,0,0.42)'; ctx.fillRect(0, 0, W, headerH);  // плашка читаемости
    ctx.textBaseline = 'middle';
    // цель: иконка + N/GOAL
    const img = engine.img(targetName);
    const ic = Math.min(headerH * 0.74, 46);
    let tx = 12;
    if (img && img.complete) { ctx.drawImage(img, tx, cy - ic / 2, ic, ic); tx += ic + 8; }
    ctx.fillStyle = hudText; ctx.textAlign = 'left';
    ctx.font = 'bold ' + Math.round(headerH * 0.36) + 'px ' + font;
    ctx.fillText(Math.min(collected, GOAL) + '/' + GOAL, tx, cy);
    // таймер-бар справа
    const bx = W * 0.52, bw = W - bx - 12, by = cy - 8, bh = 16;
    ctx.fillStyle = 'rgba(0,0,0,0.45)'; engine.rr(bx, by, bw, bh, 8); ctx.fill();
    const frac = Math.max(0, engine.timeLeft / engine.duration);
    ctx.fillStyle = frac < 0.25 ? '#e0533d' : ac; engine.rr(bx, by, Math.max(2, bw * frac), bh, 8); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5; engine.rr(bx, by, bw, bh, 8); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 12px ' + font; ctx.textAlign = 'center';
    ctx.fillText(Math.ceil(engine.timeLeft) + ' c', bx + bw / 2, by + bh / 2);
    // номер уровня
    ctx.fillStyle = 'rgba(255,255,255,0.72)'; ctx.font = 'bold 11px ' + font; ctx.textAlign = 'right';
    ctx.fillText('Уровень ' + (rounds + 1), W - 12, headerH - 9);
  }

  // ── публичный контракт сцены ──
  return {
    init: function () { /* геометрию даёт layout, поле строит reset */ },
    reset: function () {
      rounds = 0; collected = 0; multiplier = 1; selCell = null; downCell = null;
      if (goalMode) pickRound();
      buildBoard(); phase = 'idle';
    },
    layout: layout,
    update: function (dt) {
      const moving = moveTiles(dt);
      if (phase === 'swap' && !moving) {
        const m = findMatches();
        if (m.length) enterClear(m); else swapBack();
      } else if (phase === 'swapback' && !moving) {
        phase = 'idle'; selCell = null;
      } else if (phase === 'clear') {
        clearTimer += dt; clearProg = Math.min(1, clearTimer / CLEAR_DUR);
        if (clearTimer >= CLEAR_DUR) doRemoveAndFall();
      } else if (phase === 'fall' && !moving) {
        const m = findMatches();
        if (m.length) { multiplier++; enterClear(m); }
        else {
          multiplier = 1; phase = 'idle';
          if (goalMode && collected >= GOAL) advanceRound();
          else if (!hasMove()) reshuffle();
        }
      }
    },
    render: function (ctx) {
      const ac = engine.accent();
      const pad = Math.round(cell * 0.18);
      const bx = originX - pad, by = originY - pad, bw = cell * COLS + pad * 2, bh = cell * ROWS + pad * 2;
      const board = BOARD_IMG && engine.img(BOARD_IMG);
      if (board && board.complete && board.naturalWidth) {
        drawCover(ctx, board, bx, by, bw, bh);
      } else {
        ctx.fillStyle = '#3a2f20'; engine.rr(bx, by, bw, bh, pad); ctx.fill();
        ctx.strokeStyle = ac; ctx.lineWidth = 2; engine.rr(bx, by, bw, bh, pad); ctx.stroke();
        for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
          const x = cellX(c), y = cellY(r);
          ctx.fillStyle = ((r + c) & 1) ? 'rgba(255,240,200,0.06)' : 'rgba(0,0,0,0.18)';
          ctx.fillRect(x + 1, y + 1, cell - 2, cell - 2);
        }
      }
      if (selCell) {
        const x = cellX(selCell.c), y = cellY(selCell.r);
        ctx.strokeStyle = ac; ctx.lineWidth = 3;
        engine.rr(x + 2, y + 2, cell - 4, cell - 4, 6); ctx.stroke();
      }
      const inset = cell * 0.1;
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
        const t = grid[r][c]; if (!t) continue;
        const img = engine.img(activeNames[t.type]); if (!img || !img.complete) continue;
        let s = t.clearing ? 1 - clearProg : 1;
        if (s <= 0.02) continue;
        const size = (cell - inset * 2) * s;
        const ccx = t.px + cell / 2, ccy = t.py + cell / 2;
        ctx.globalAlpha = t.clearing ? Math.max(0, 1 - clearProg) : 1;
        ctx.drawImage(img, ccx - size / 2, ccy - size / 2, size, size);
        ctx.globalAlpha = 1;
      }
    },
    hud: goalMode ? sceneHud : undefined,
    // отладка/тесты: снимок внутреннего состояния (без рендера)
    _state: function () {
      return { collected: collected, rounds: rounds, phase: phase, targetIdx: targetIdx, targetName: targetName,
               N: N, activeNames: activeNames.slice(), cell: cell, originX: originX, originY: originY,
               grid: grid.map(function (row) { return row.map(function (t) { return t ? t.type : null; }); }) };
    },
    pointerDown: function (p) { downCell = cellAt(p.x, p.y); },
    pointerUp: function (e) {
      if (phase !== 'idle') { downCell = null; return; }
      if (downCell && e.dist > cell * 0.4) {
        let nr = downCell.r, nc = downCell.c;
        if (Math.abs(e.dx) > Math.abs(e.dy)) nc += e.dx > 0 ? 1 : -1; else nr += e.dy > 0 ? 1 : -1;
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) { trySwap({ r: downCell.r, c: downCell.c }, { r: nr, c: nc }); selCell = null; downCell = null; return; }
      }
      const up = cellAt(e.x, e.y);
      if (up) {
        if (!selCell) selCell = { r: up.r, c: up.c };
        else if (selCell.r === up.r && selCell.c === up.c) selCell = null;
        else if (adjacent(selCell, up)) { trySwap(selCell, up); selCell = null; }
        else selCell = { r: up.r, c: up.c };
      }
      downCell = null;
    },
  };
});

Engine.boot(CONFIG);
</script></body></html>
