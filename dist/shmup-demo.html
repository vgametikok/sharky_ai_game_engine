<!DOCTYPE html><html lang="ru"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Shark Shooter</title>
<style>
  :root { --ac:#e7b44c; }
  html,body{margin:0;width:100vw;height:100vh;overflow:hidden;touch-action:none;background:#000;}
  canvas{display:block;width:100%;height:100%;}
</style></head><body>
<canvas id="c"></canvas>
<script>
'use strict';
const CONFIG = {"genre":"shmup","meta":{"title":"Shark Shooter"},"theme":{"accent":"#7ce0ff","bgTop":"#0d2b4a","bgBottom":"#041020","font":"'Segoe UI', system-ui, sans-serif","labels":{"over":"ПОТОПЛЕН","again":"Тап — заново","scoreUnit":"очков","hint":"Веди пальцем · ✦ бомба · ⇄ цвет"}},"rules":{"mode":"untimed"},"shmup":{"scroll":{"speed":55,"stars":true},"player":{"w":26,"h":30,"speed":270,"hp":3,"bombs":3,"hitboxR":3.5},"weapon":{"cooldown":0.15,"shotSpeed":430,"levels":[{"count":1,"spread":0,"dmg":1},{"count":2,"spread":0.16,"dmg":1},{"count":3,"spread":0.35,"dmg":1},{"count":4,"spread":0.5,"dmg":1},{"count":5,"spread":0.7,"dmg":1.5}]},"polarity":true,"colors":["#7ce0ff","#ff6b9e"],"graze":{"radius":17,"score":15},"enemies":{"jelly":{"w":24,"h":22,"hp":2,"speed":55,"color":"#b48cff","move":"sine","gun":{"cooldown":1.7,"speed":120},"score":50,"drop":"up","dropChance":0.3},"crab":{"w":30,"h":24,"hp":4,"speed":40,"color":"#e07050","move":"straight","gun":{"cooldown":2.1,"speed":140,"aim":"player"},"score":80,"drop":"up","dropChance":0.25},"ray":{"w":36,"h":20,"hp":3,"speed":70,"color":"#70c8a8","move":"dive","score":70,"drop":"bomb","dropChance":0.15},"squid":{"w":28,"h":30,"hp":6,"speed":30,"color":"#e0c050","move":"hover","gun":{"cooldown":1.5,"speed":130,"aim":"spread3"},"score":140,"drop":"heart","dropChance":0.2}},"waves":[{"t":1,"enemy":"jelly","n":4,"interval":0.4},{"t":4,"enemy":"jelly","n":5,"interval":0.35},{"t":7.5,"enemy":"crab","n":2,"interval":0.8},{"t":10.5,"enemy":"ray","n":3,"interval":0.5},{"t":13,"enemy":"jelly","n":6,"interval":0.3},{"t":16,"enemy":"squid","n":1},{"t":18,"enemy":"crab","n":3,"interval":0.7},{"t":21,"enemy":"ray","n":4,"interval":0.45},{"t":24,"enemy":"squid","n":2,"interval":1.2}],"loop":{"hpMul":1.35,"rateMul":0.92}}};
/* ============================================================
   SHARKY GAME ENGINE — universal core (core.js)
   ------------------------------------------------------------
   Общий слой для всех мини-игр ленты Sharky:
     • canvas + DPR + resize/layout
     • игровой цикл (loop/update/render)
     • ввод: pointer (tap/swipe) + клавиатура
     • звук (beep), частицы (burst)
     • загрузка base64-ассетов
     • тематический HUD (счёт + полоса таймера) и экран Game Over
     • ПРОТОКОЛ Sharky (postMessage): принимает init/start/pause,
       шлёт ready/score/gameover; автостарт ВНЕ ленты по таймеру.

   Игра = это ядро + один МОДУЛЬ-СЦЕНА (механика, регистрируется
   через Engine.register) + объект CONFIG (тема/правила/ассеты).
   Сборщик (build.js) встраивает все три части в один .html —
   игры в Sharky крутятся в sandbox-iframe через srcdoc, поэтому
   внешние <script> и относительные ассеты недопустимы.

   ── КОНТРАКТ СЦЕНЫ ──
   Engine.register('genre', function(engine, cfg){
     return {
       init(){},          // одноразовая настройка (ассеты+геометрия готовы)
       reset(){},         // (пере)собрать игровое состояние; на каждый запуск
       layout(L){},       // пересчёт геометрии из {W,H,headerH}
       update(dt){},      // продвинуть механику (таймер ведёт ЯДРО)
       render(ctx){},     // нарисовать поле (фон/HUD/оверлей рисует ЯДРО)
       pointerDown(p){},  // p = {x,y} в пикселях canvas
       pointerUp(e){},    // e = {x,y,downX,downY,dx,dy,dist,dir}
       pointerMove(p){},
       key(k){},          // k = event.key
     };
   });

   ── API ЯДРА для сцены (engine.*) ──
     ctx, W, H, headerH, cfg, theme, rules, score   (только чтение)
     img(name) -> HTMLImageElement
     beep(freq,dur,type,vol)
     burst(x,y,opts)                  // частицы (по умолчанию — как в match3)
     addScore(n) / setScore(v)        // меняет счёт + шлёт его в ленту
     gameOver()                       // завершить забег (смерть). Таймер тоже завершает.
     rr(x,y,w,h,r) / accent()         // помощники рисования
   ============================================================ */
(function (global) {
  'use strict';

  // ── canvas / контекст ──
  let cv, ctx;
  let W = 360, H = 580, headerH = 70, dpr = 1;

  // ── конфиг / сцена ──
  let cfg = null, theme = {}, rules = {}, scene = null;

  // ── состояние забега ──
  let state = 'loading';            // loading | playing | over
  let running = false, raf = 0, last = 0;
  let score = 0, best = 0, timeLeft = 0, duration = 0, timed = false;
  let assetsReady = false, pendingStart = false, gotShell = false;

  // ── ассеты ──
  const IMG = {}; let imgTotal = 0, imgLoaded = 0;

  // ── звук ──
  let audioCtx = null;

  // ── частицы ──
  const parts = [];

  // ── ввод ──
  let downX = 0, downY = 0, hasDown = false;
  const pointers = {};        // pointerId → {x,y} точки нажатия (мультитач)
  const keys = new Set();     // зажатые клавиши (для платформеров и т.п.)
  const GAME_KEYS = [' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];

  // ── объект, который получает сцена ──
  const api = {
    get ctx() { return ctx; },
    get W() { return W; },
    get H() { return H; },
    get headerH() { return headerH; },
    get cfg() { return cfg; },
    get theme() { return theme; },
    get rules() { return rules; },
    get score() { return score; },
    get timeLeft() { return timeLeft; },
    get duration() { return duration; },
    get state() { return state; },
    get keys() { return keys; },          // живой Set зажатых клавиш
    img: function (name) { return IMG[name]; },
    beep: beep,
    burst: burst,
    addScore: addScore,
    setScore: setScore,
    gameOver: gameOver,
    resetTimer: resetTimer,
    rr: rr,
    accent: accent,
  };

  const Engine = {
    scenes: {},
    register: function (name, factory) { this.scenes[name] = factory; },
    boot: boot,
  };
  global.Engine = Engine;

  // Диагностика (можно дёрнуть из консоли): текущее состояние движка.
  Engine.debug = function () {
    return { state: state, running: running, assetsReady: assetsReady, pendingStart: pendingStart,
             gotShell: gotShell, imgLoaded: imgLoaded, imgTotal: imgTotal, hasScene: !!scene,
             W: W, H: H };
  };
  // Принудительный одиночный кадр (для тестов в скрытой вкладке, где rAF не тикает).
  Engine.renderOnce = function () { if (scene && assetsReady) render(); };

  // ════════════════════════════════════════════ BOOT
  function boot(config) {
    cfg = config; theme = config.theme || {}; rules = config.rules || {};
    duration = rules.duration || 60;
    timed = (rules.mode || 'timed') === 'timed';
    cv = document.getElementById('c'); ctx = cv.getContext('2d');
    if (theme.accent) document.documentElement.style.setProperty('--ac', theme.accent);
    if (theme.bgBottom || theme.bgTop) document.body.style.background = theme.bgBottom || theme.bgTop;

    const factory = Engine.scenes[config.genre];
    if (!factory) { console.error('Engine: нет сцены для жанра', config.genre); return; }
    scene = factory(api, config);
    Engine._scene = scene;   // для отладки/тестов

    window.addEventListener('resize', resize);
    bindInput();
    bindProtocol();
    window.addEventListener('load', function () {
      loadImages(config.assets || {});
      // Автостарт ТОЛЬКО вне Sharky. В ленте всегда приходит init -> gotShell=true.
      setTimeout(function () {
        if (!gotShell) { if (assetsReady) start(); else pendingStart = true; }
      }, 400);
    });
  }

  // ════════════════════════════════════════════ ГЕОМЕТРИЯ
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = cv.clientWidth || 360; H = cv.clientHeight || 580;
    cv.width = Math.round(W * dpr); cv.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;            // чёткий пиксель-арт
    headerH = Math.max(48, Math.min(96, H * 0.13));
    if (scene && scene.layout) scene.layout({ W: W, H: H, headerH: headerH });
  }

  // ════════════════════════════════════════════ АССЕТЫ
  function loadImages(map) {
    const names = Object.keys(map);
    imgTotal = names.length; imgLoaded = 0;
    if (imgTotal === 0) { onReady(); return; }
    names.forEach(function (n) {
      const im = new Image();
      im.onload = im.onerror = function () { imgLoaded++; if (imgLoaded >= imgTotal) onReady(); };
      const v = map[n];
      // поддержка готовых data-URL (jpg/webp/png) и «сырого» base64 (по умолч. png)
      im.src = (typeof v === 'string' && v.lastIndexOf('data:', 0) === 0) ? v : ('data:image/png;base64,' + v);
      IMG[n] = im;
    });
  }
  function onReady() {
    resize();
    try {
      if (scene.init) scene.init();
      newRun();
    } catch (e) { console.error('Engine onReady scene error:', e); }
    assetsReady = true;
    try { const v = getComputedStyle(document.documentElement).getPropertyValue('--ac').trim(); if (v) theme.accent = v; } catch (e) {}
    send({ type: 'ready' });
    if (pendingStart) start();
  }

  // ════════════════════════════════════════════ ЖИЗНЕННЫЙ ЦИКЛ
  function newRun() {
    score = 0; timeLeft = duration; state = 'playing'; parts.length = 0; overLabel = null;
    if (scene.reset) scene.reset();
    send({ type: 'score', value: 0 });
  }
  function start() {
    if (!assetsReady) { pendingStart = true; return; }
    if (running) return;
    running = true; last = performance.now();
    if (audioCtx && audioCtx.state !== 'running') audioCtx.resume();
    raf = requestAnimationFrame(loop);
  }
  function pause() {
    running = false; cancelAnimationFrame(raf);
    if (audioCtx && audioCtx.state === 'running') audioCtx.suspend();
  }
  function restart() {
    if (audioCtx && audioCtx.state !== 'running') audioCtx.resume();
    newRun();
  }
  function loop(t) {
    if (!running) return;
    const dt = Math.min((t - last) / 1000, 0.05); last = t;
    try { update(dt); render(); }
    catch (e) { running = false; console.error('Engine loop error:', e); return; }
    raf = requestAnimationFrame(loop);
  }
  function update(dt) {
    if (state === 'playing') {
      if (timed) { timeLeft -= dt; if (timeLeft <= 0) { timeLeft = 0; gameOver(); } }
      if (scene.update) scene.update(dt);
    }
    updateParts(dt);
  }
  let overLabel = null;   // надпись на экране конца (переопределяет labels.over, напр. «ПОБЕДА»)
  function gameOver(opts) {
    if (state === 'over') return;
    overLabel = (opts && opts.label) || null;
    state = 'over';
    send({ type: 'gameover', value: score });
  }
  // Сброс таймера раунда (для пораундовых игр). Без аргумента — на полную длительность.
  function resetTimer(sec) { if (sec) duration = sec; timeLeft = duration; }

  // ════════════════════════════════════════════ СЧЁТ
  function addScore(n) { setScore(score + n); }
  function setScore(v) {
    score = v; if (score > best) best = score;
    send({ type: 'score', value: score });
  }

  // ════════════════════════════════════════════ РЕНДЕР
  function render() {
    drawBg();
    if (scene.render) scene.render(ctx);
    drawParts();
    if (scene.hud) scene.hud(ctx); else drawHUD();
    if (state === 'over') drawOver();
  }
  function drawBg() {
    const bg = theme.bgImage && IMG[theme.bgImage];
    if (bg && bg.complete && bg.naturalWidth) {
      // по ширине экрана, верх закреплён наверху, низ обрезается
      const dh = bg.naturalHeight * (W / bg.naturalWidth);
      ctx.drawImage(bg, 0, 0, W, dh);
      if (dh < H) { ctx.fillStyle = theme.bgBottom || '#111'; ctx.fillRect(0, dh, W, H - dh); }
    } else {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, theme.bgTop || '#222'); g.addColorStop(1, theme.bgBottom || '#111');
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    }
  }
  function drawHUD() {
    ctx.textBaseline = 'middle';
    const cy = headerH / 2;
    const font = theme.font || "Georgia, serif";
    let textX = 16;
    const ico = theme.hudIcon && IMG[theme.hudIcon];
    if (ico && ico.complete) {
      const ic = Math.min(34, headerH * 0.5);
      ctx.drawImage(ico, 12, cy - ic / 2, ic, ic);
      textX = 16 + ic;
    }
    ctx.fillStyle = theme.hudText || '#f4e3b0';
    ctx.font = 'bold ' + Math.round(headerH * 0.34) + 'px ' + font;
    ctx.textAlign = 'left'; ctx.fillText(String(score), textX, cy);
    if (timed) {
      const bx = W * 0.46, bw = W - bx - 14, by = cy - 7, bh = 14;
      ctx.fillStyle = 'rgba(0,0,0,0.4)'; rr(bx, by, bw, bh, 7); ctx.fill();
      const frac = Math.max(0, timeLeft / duration);
      ctx.fillStyle = accent(); rr(bx, by, Math.max(2, bw * frac), bh, 7); ctx.fill();
      ctx.strokeStyle = 'rgba(244,227,176,0.6)'; ctx.lineWidth = 1.5; rr(bx, by, bw, bh, 7); ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 12px ' + font; ctx.textAlign = 'center';
      ctx.fillText(Math.ceil(timeLeft) + '', bx + bw / 2, by + bh / 2);
    }
  }
  function drawOver() {
    const L = theme.labels || {};
    ctx.fillStyle = 'rgba(10,7,4,0.78)'; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const font = theme.font || "Georgia, serif";
    ctx.fillStyle = accent(); ctx.font = 'bold ' + Math.round(W * 0.085) + 'px ' + font;
    ctx.fillText(overLabel || L.over || 'GAME OVER', W / 2, H * 0.4);
    ctx.fillStyle = theme.hudText || '#f4e3b0'; ctx.font = 'bold ' + Math.round(W * 0.13) + 'px ' + font;
    ctx.fillText(String(score), W / 2, H * 0.52);
    ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = Math.round(W * 0.045) + 'px ' + font;
    ctx.fillText(L.scoreUnit || 'points', W / 2, H * 0.585);
    ctx.fillStyle = '#fff'; ctx.font = Math.round(W * 0.05) + 'px ' + font;
    ctx.fillText(L.again || 'Tap to play again', W / 2, H * 0.7);
  }
  function rr(x, y, w, h, r) {
    ctx.beginPath(); ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
  }
  function accent() { return theme.accent || '#e7b44c'; }

  // ════════════════════════════════════════════ ЧАСТИЦЫ
  function burst(x, y, o) {
    o = o || {};
    if (parts.length > 140) return;
    const count = o.count || 4, col = o.color || accent(), g = (o.gravity == null ? 300 : o.gravity);
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2, sp = 40 + Math.random() * 120;
      parts.push({ x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40,
                   life: 0.5 + Math.random() * 0.3, t: 0, s: 2 + Math.random() * 3, g: g, col: col });
    }
  }
  function updateParts(dt) {
    for (let i = parts.length - 1; i >= 0; i--) {
      const p = parts[i]; p.t += dt; if (p.t >= p.life) { parts.splice(i, 1); continue; }
      p.vy += p.g * dt; p.x += p.vx * dt; p.y += p.vy * dt;
    }
  }
  function drawParts() {
    for (let i = 0; i < parts.length; i++) {
      const p = parts[i], a = Math.max(0, 1 - p.t / p.life);
      ctx.globalAlpha = a; ctx.fillStyle = p.col;
      ctx.fillRect(p.x - p.s / 2, p.y - p.s / 2, p.s, p.s);
    }
    ctx.globalAlpha = 1;
  }

  // ════════════════════════════════════════════ ЗВУК (после первого тапа)
  function ensureAudio() {
    if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  }
  function beep(freq, dur, wtype, vol) {
    if (!audioCtx || audioCtx.state !== 'running') return;
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = wtype || 'square'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(Math.min(vol || 0.15, 0.6), t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start(t); o.stop(t + dur + 0.03);
  }

  // ════════════════════════════════════════════ ВВОД
  function localPt(e) {
    const r = cv.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }
  function bindInput() {
    cv.addEventListener('pointerdown', function (e) {
      ensureAudio(); if (audioCtx && audioCtx.state !== 'running') audioCtx.resume();
      if (state === 'over') { restart(); return; }
      const p = localPt(e); p.id = e.pointerId;
      pointers[e.pointerId] = { x: p.x, y: p.y };
      downX = p.x; downY = p.y; hasDown = true;   // совместимость со сценами без мультитача
      if (scene.pointerDown) scene.pointerDown(p);
    });
    cv.addEventListener('pointerup', function (e) { endPointer(e, false); });
    cv.addEventListener('pointercancel', function (e) { endPointer(e, true); });
    cv.addEventListener('pointermove', function (e) {
      if (scene.pointerMove) { const p = localPt(e); p.id = e.pointerId; scene.pointerMove(p); }
    });
    window.addEventListener('keydown', function (e) {
      if (GAME_KEYS.indexOf(e.key) !== -1) e.preventDefault();
      keys.add(e.key);
      if (scene.key) scene.key(e.key);
    });
    window.addEventListener('keyup', function (e) { keys.delete(e.key); });
    window.addEventListener('blur', function () { keys.clear(); });
  }
  function endPointer(e, cancelled) {
    const start = pointers[e.pointerId]; delete pointers[e.pointerId];
    if (state === 'over') { hasDown = false; return; }
    const p = localPt(e);
    const sx = start ? start.x : downX, sy = start ? start.y : downY;
    const dx = p.x - sx, dy = p.y - sy, dist = Math.sqrt(dx * dx + dy * dy);
    const dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up');
    if (scene.pointerUp) scene.pointerUp({ x: p.x, y: p.y, id: e.pointerId, downX: sx, downY: sy,
      dx: dx, dy: dy, dist: dist, dir: dir, had: hasDown, cancelled: !!cancelled });
    hasDown = false;
  }

  // ════════════════════════════════════════════ ПРОТОКОЛ SHARKY
  function send(m) { try { parent.postMessage(m, '*'); } catch (e) {} }
  function bindProtocol() {
    window.addEventListener('message', function (e) {
      const d = e.data || {};
      if (d.type === 'init') {
        gotShell = true;
        if (d.accent) { theme.accent = d.accent; document.documentElement.style.setProperty('--ac', d.accent); }
      } else if (d.type === 'start') { gotShell = true; start(); }
      else if (d.type === 'pause') { gotShell = true; pause(); }
    });
  }

})(typeof window !== 'undefined' ? window : this);

/* ============================================================
   СЦЕНА: shmup (shmup.js) — вертикальный шмап
   ------------------------------------------------------------
   Скролл вверх, автострельба, волны врагов по расписанию с лупом
   и нарастающей сложностью. Всё — данными CONFIG.shmup.

   Механики:
   • АПГРЕЙДЫ ОРУЖИЯ: пикап 'P' повышает уровень (weapon.levels),
     смерть сбрасывает на 1 уровень.
   • БОМБА ('B', ограниченный запас): чистит все вражеские пули
     (в очки) и бьёт всех врагов на экране.
   • ПОЛЯРИЗАЦИЯ (Ikaruga, polarity:true): у игрока и пуль два цвета;
     пуля СВОЕГО цвета поглощается ядром (+очки), ЧУЖОГО — урон.
     Переключение кнопкой ⇄ / клавишей C.
   • ГРЕЙЗ (Touhou): хитбокс-ядро много меньше спрайта (hitboxR);
     пуля, прошедшая рядом с ядром (grazeR), даёт очки за смелость.

   CONFIG.shmup = {
     scroll:{speed,stars}, player:{w,h,speed,hp,bombs,hitboxR,color},
     weapon:{cooldown,shotSpeed,levels:[{count,spread,dmg}...]},
     polarity:true, colors:['#7ce0ff','#ff6b9e'], graze:{radius,score},
     enemies:{id:{w,h,hp,speed,color,move:'straight|sine|dive|hover',
                  gun:{cooldown,speed,aim:'down|player|spread3',pol}, score, drop}},
     waves:[{t,enemy,n,interval,x}], loop:{hpMul,rateMul}
   }
   ============================================================ */
Engine.register('shmup', function (engine, cfg) {
  'use strict';
  const S = cfg.shmup || {};
  const SC = Object.assign({ speed: 42, stars: true }, S.scroll || {});
  const PL = Object.assign({ w: 26, h: 30, speed: 260, hp: 3, bombs: 3, hitboxR: 3.5, color: '#7ce0ff' }, S.player || {});
  const WPN = Object.assign({ cooldown: 0.16, shotSpeed: 420 }, S.weapon || {});
  const LEVELS = WPN.levels || [{ count: 1, spread: 0, dmg: 1 }, { count: 2, spread: 0.18, dmg: 1 }, { count: 3, spread: 0.34, dmg: 1 }, { count: 5, spread: 0.6, dmg: 1 }];
  const POLAR = !!S.polarity;
  const PCOL = S.colors || ['#7ce0ff', '#ff6b9e'];
  const GRAZE = Object.assign({ radius: 16, score: 15 }, S.graze || {});
  const ENEMIES = S.enemies || {};
  const WAVES = S.waves || [];
  const LOOP = Object.assign({ hpMul: 1.3, rateMul: 0.9 }, S.loop || {});
  const LB = (cfg.theme && cfg.theme.labels) || {};
  const FONT = (cfg.theme && cfg.theme.font) || 'sans-serif';

  let W = 360, H = 640;
  let p = null;                      // игрок
  let foes = [], eb = [], pb = [], drops = [];   // враги, пули врагов, пули игрока, пикапы
  let time = 0, waveT = 0, waveIdx = 0, loopN = 0, shootT = 0;
  let target = null;                 // палец: целевая позиция
  let btns = [];
  let stars = [];
  let shakeT = 0, flashT = 0;

  function reset() {
    p = { x: W / 2, y: H * 0.8, hp: PL.hp, bombs: PL.bombs, lvl: 0, pol: 0, inv: 0, dead: false };
    foes = []; eb = []; pb = []; drops = [];
    time = 0; waveT = 0; waveIdx = 0; loopN = 0; shootT = 0; target = null;
    stars = [];
    for (let i = 0; i < 40; i++) stars.push({ x: Math.random() * W, y: Math.random() * H, s: 0.4 + Math.random() * 1.6 });
    layoutButtons();
  }
  function layoutButtons() {
    btns = [];
    const r = Math.min(W, H) * 0.07, m = r * 0.6;
    btns.push({ id: 'bomb', x: W - m - r, y: H - m - r, r: r, glyph: '✦' });
    if (POLAR) btns.push({ id: 'pol', x: m + r, y: H - m - r, r: r, glyph: '⇄' });
  }

  // ── спавн волн ──
  function spawnWave(w) {
    const def = ENEMIES[w.enemy]; if (!def) return;
    const n = w.n || 1;
    for (let i = 0; i < n; i++) {
      setTimeoutSim(i * (w.interval || 0.35), function (k) {
        const fx = (w.x != null) ? w.x * W : (n === 1 ? W / 2 : (0.15 + 0.7 * (k / Math.max(1, n - 1))) * W);
        foes.push({ def: def, x: fx, y: -30, w: def.w || 26, h: def.h || 24,
          hp: (def.hp || 1) * Math.pow(LOOP.hpMul, loopN), t: Math.random() * 6,
          gunT: (def.gun ? def.gun.cooldown * (0.5 + Math.random()) : 0),
          baseX: fx, pol: def.gun && def.gun.pol != null ? def.gun.pol : ((Math.random() * 2) | 0) });
      }, i);
    }
  }
  // простые «отложенные» спавны без setTimeout (управляем сами)
  let pending = [];
  function setTimeoutSim(delay, fn, arg) { pending.push({ t: delay, fn: fn, arg: arg }); }

  function fireWeapon() {
    const lv = LEVELS[Math.min(p.lvl, LEVELS.length - 1)];
    for (let i = 0; i < lv.count; i++) {
      const a = -Math.PI / 2 + (lv.count > 1 ? (i - (lv.count - 1) / 2) * (lv.spread / Math.max(1, lv.count - 1)) : 0);
      pb.push({ x: p.x, y: p.y - PL.h * 0.4, vx: Math.cos(a) * WPN.shotSpeed, vy: Math.sin(a) * WPN.shotSpeed, dmg: lv.dmg });
    }
    engine.beep(760, 0.04, 'square', 0.06);
  }
  function enemyFire(f) {
    const g = f.def.gun; if (!g) return;
    const pol = POLAR ? f.pol : 0;
    const mk = (vx, vy) => eb.push({ x: f.x, y: f.y + f.h / 2, vx: vx, vy: vy, pol: pol, grazed: false });
    if (g.aim === 'player') {
      const dx = p.x - f.x, dy = p.y - f.y, L = Math.max(1, Math.hypot(dx, dy));
      mk(dx / L * g.speed, dy / L * g.speed);
    } else if (g.aim === 'spread3') {
      for (let a = -1; a <= 1; a++) { const ang = Math.PI / 2 + a * 0.35; mk(Math.cos(ang) * g.speed, Math.sin(ang) * g.speed); }
    } else mk(0, g.speed);
    engine.beep(300, 0.05, 'sawtooth', 0.05);
  }
  function useBomb() {
    if (p.bombs <= 0) return;
    p.bombs--; flashT = 0.35; shakeT = 0.3;
    engine.addScore(eb.length * 5);
    eb = [];
    foes.forEach(f => { f.hp -= 6; if (f.hp <= 0) killFoe(f); });
    foes = foes.filter(f => f.hp > 0);
    engine.beep(90, 0.5, 'sawtooth', 0.3);
  }
  function killFoe(f) {
    engine.addScore(f.def.score || 50);
    engine.burst(f.x, f.y, { count: 12, color: f.def.color || '#f80' });
    if (f.def.drop && Math.random() < (f.def.dropChance || 0.35))
      drops.push({ x: f.x, y: f.y, kind: f.def.drop, t: 0 });
    engine.beep(160, 0.15, 'square', 0.12);
  }
  function hurtPlayer() {
    if (p.inv > 0) return;
    p.hp--; p.inv = 1.6; shakeT = 0.3;
    p.lvl = Math.max(0, p.lvl - 1);                     // смерть сбрасывает апгрейд
    engine.burst(p.x, p.y, { count: 16, color: '#fff' });
    engine.beep(120, 0.3, 'sawtooth', 0.2);
    if (p.hp <= 0) { p.dead = true; engine.gameOver(); }
  }

  return {
    init: function () {},
    reset: reset,
    layout: function (L) { W = L.W; H = L.H; layoutButtons(); },

    update: function (dt) {
      time += dt;
      p.inv = Math.max(0, p.inv - dt);
      flashT = Math.max(0, flashT - dt);
      shakeT = Math.max(0, shakeT - dt);

      // ── скролл-звёзды ──
      stars.forEach(s => { s.y += SC.speed * s.s * dt; if (s.y > H) { s.y = -4; s.x = Math.random() * W; } });

      // ── расписание волн (+луп со сложностью) ──
      waveT += dt;
      while (waveIdx < WAVES.length && WAVES[waveIdx].t * Math.pow(LOOP.rateMul, loopN) <= waveT) {
        spawnWave(WAVES[waveIdx]); waveIdx++;
      }
      if (waveIdx >= WAVES.length && foes.length === 0 && pending.length === 0) {
        loopN++; waveIdx = 0; waveT = 0;                 // новый круг сложнее
      }
      for (let i = pending.length - 1; i >= 0; i--) { pending[i].t -= dt; if (pending[i].t <= 0) { pending[i].fn(pending[i].arg); pending.splice(i, 1); } }

      // ── игрок: тач-перетаскивание или клавиши ──
      const k = engine.keys;
      let mx = (k.has('ArrowLeft') || k.has('a') ? -1 : 0) + (k.has('ArrowRight') || k.has('d') ? 1 : 0);
      let my = (k.has('ArrowUp') || k.has('w') ? -1 : 0) + (k.has('ArrowDown') || k.has('s') ? 1 : 0);
      if (target) {
        p.x += (target.x - p.x) * Math.min(1, dt * 14);
        p.y += (target.y - p.y) * Math.min(1, dt * 14);
      } else { p.x += mx * PL.speed * dt; p.y += my * PL.speed * dt; }
      p.x = Math.max(PL.w / 2, Math.min(W - PL.w / 2, p.x));
      p.y = Math.max(PL.h, Math.min(H - PL.h / 2, p.y));

      // автострельба
      shootT -= dt; if (shootT <= 0) { shootT = WPN.cooldown; fireWeapon(); }

      // ── враги ──
      for (let i = foes.length - 1; i >= 0; i--) {
        const f = foes[i], d = f.def; f.t += dt;
        const sp = d.speed || 60;
        if (d.move === 'sine') { f.y += sp * dt; f.x = f.baseX + Math.sin(f.t * 2.2) * W * 0.18; }
        else if (d.move === 'dive') { f.y += sp * dt * (f.y < H * 0.3 ? 1 : 2.2); f.x += Math.sign(p.x - f.x) * sp * 0.4 * dt; }
        else if (d.move === 'hover') { f.y += (f.y < H * 0.22 ? sp : 0) * dt; f.x = f.baseX + Math.sin(f.t * 1.4) * W * 0.24; }
        else f.y += sp * dt;
        if (f.y > H + 40) { foes.splice(i, 1); continue; }
        if (d.gun) { f.gunT -= dt; if (f.gunT <= 0 && f.y > 0 && f.y < H * 0.75) { f.gunT = d.gun.cooldown; enemyFire(f); } }
        // столкновение корпусом
        if (Math.abs(f.x - p.x) < (f.w + PL.w) / 2 - 4 && Math.abs(f.y - p.y) < (f.h + PL.h) / 2 - 4) hurtPlayer();
      }

      // ── пули игрока ──
      for (let i = pb.length - 1; i >= 0; i--) {
        const b = pb[i]; b.x += b.vx * dt; b.y += b.vy * dt;
        if (b.y < -10 || b.x < -10 || b.x > W + 10) { pb.splice(i, 1); continue; }
        for (let j = 0; j < foes.length; j++) {
          const f = foes[j];
          if (Math.abs(b.x - f.x) < f.w / 2 + 3 && Math.abs(b.y - f.y) < f.h / 2 + 3) {
            f.hp -= b.dmg; pb.splice(i, 1);
            engine.burst(b.x, b.y, { count: 3, color: '#fff' });
            if (f.hp <= 0) { killFoe(f); foes.splice(j, 1); }
            break;
          }
        }
      }

      // ── пули врагов: ядро-хитбокс, поляризация, грейз ──
      for (let i = eb.length - 1; i >= 0; i--) {
        const b = eb[i]; b.x += b.vx * dt; b.y += b.vy * dt;
        if (b.y > H + 12 || b.y < -12 || b.x < -12 || b.x > W + 12) { eb.splice(i, 1); continue; }
        const dx = b.x - p.x, dy = b.y - p.y, dist = Math.hypot(dx, dy);
        if (dist < PL.hitboxR + 3) {
          if (POLAR && b.pol === p.pol) {               // поглощение своего цвета
            engine.addScore(10);
            engine.burst(b.x, b.y, { count: 4, color: PCOL[b.pol] });
            engine.beep(880, 0.05, 'triangle', 0.08);
          } else hurtPlayer();
          eb.splice(i, 1); continue;
        }
        if (!b.grazed && dist < GRAZE.radius) {         // грейз: прошла рядом
          b.grazed = true; engine.addScore(GRAZE.score);
          engine.burst(p.x, p.y, { count: 2, color: '#fff' });
        }
      }

      // ── пикапы ──
      for (let i = drops.length - 1; i >= 0; i--) {
        const d = drops[i]; d.y += 70 * dt; d.t += dt;
        if (d.y > H + 16) { drops.splice(i, 1); continue; }
        if (Math.abs(d.x - p.x) < 20 && Math.abs(d.y - p.y) < 22) {
          if (d.kind === 'up') { p.lvl = Math.min(p.lvl + 1, LEVELS.length - 1); engine.addScore(30); }
          else if (d.kind === 'bomb') p.bombs++;
          else if (d.kind === 'heart') p.hp++;
          engine.beep(700, 0.1, 'triangle', 0.14);
          drops.splice(i, 1);
        }
      }
    },

    render: function (ctx) {
      const ox = shakeT > 0 ? (Math.random() * 2 - 1) * 4 : 0;
      ctx.save(); ctx.translate(ox, 0);
      // звёзды/пузырьки
      if (SC.stars) {
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        stars.forEach(s => ctx.fillRect(s.x, s.y, s.s < 1.2 ? 1 : 2, s.s < 1.2 ? 3 : 5));
      }
      // пикапы
      drops.forEach(d => {
        const bob = Math.sin(d.t * 5) * 2;
        ctx.fillStyle = d.kind === 'up' ? '#ffd75e' : d.kind === 'bomb' ? '#b48cff' : '#ff6b7e';
        ctx.beginPath(); ctx.arc(d.x, d.y + bob, 10, 0, 7); ctx.fill();
        ctx.fillStyle = '#222'; ctx.font = 'bold 12px ' + FONT; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(d.kind === 'up' ? 'P' : d.kind === 'bomb' ? 'B' : '+', d.x, d.y + bob + 1);
      });
      // враги
      foes.forEach(f => {
        ctx.fillStyle = f.def.color || '#e07070';
        ctx.beginPath();
        ctx.moveTo(f.x, f.y + f.h / 2); ctx.lineTo(f.x - f.w / 2, f.y - f.h / 2);
        ctx.lineTo(f.x + f.w / 2, f.y - f.h / 2); ctx.closePath(); ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.stroke();
        if (POLAR) { ctx.fillStyle = PCOL[f.pol]; ctx.beginPath(); ctx.arc(f.x, f.y, 4, 0, 7); ctx.fill(); }
      });
      // пули игрока
      ctx.fillStyle = '#eaffff';
      pb.forEach(b => ctx.fillRect(b.x - 2, b.y - 6, 4, 10));
      // пули врагов (цвет = полярность)
      eb.forEach(b => {
        ctx.fillStyle = POLAR ? PCOL[b.pol] : '#ff9e9e';
        ctx.beginPath(); ctx.arc(b.x, b.y, 4.5, 0, 7); ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 1; ctx.stroke();
      });
      // игрок (мигает в i-frames): кораблик-акула
      if (!(p.inv > 0 && Math.floor(time * 14) % 2 === 0)) {
        const col = POLAR ? PCOL[p.pol] : PL.color;
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y - PL.h / 2); ctx.lineTo(p.x - PL.w / 2, p.y + PL.h / 2);
        ctx.lineTo(p.x, p.y + PL.h * 0.28); ctx.lineTo(p.x + PL.w / 2, p.y + PL.h / 2);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1.5; ctx.stroke();
        // ядро-хитбокс (Touhou-style, видно всегда)
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(p.x, p.y, PL.hitboxR, 0, 7); ctx.fill();
        ctx.strokeStyle = col; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(p.x, p.y, PL.hitboxR + 2, 0, 7); ctx.stroke();
      }
      // вспышка бомбы
      if (flashT > 0) { ctx.fillStyle = 'rgba(255,255,255,' + (flashT * 1.8).toFixed(2) + ')'; ctx.fillRect(-10, 0, W + 20, H); }
      ctx.restore();
    },

    hud: function (ctx) {
      ctx.textBaseline = 'middle';
      // жизни
      for (let i = 0; i < p.hp; i++) { ctx.fillStyle = '#ff6b7e'; ctx.beginPath(); ctx.arc(18 + i * 20, 18, 7, 0, 7); ctx.fill(); }
      // бомбы
      for (let i = 0; i < p.bombs; i++) { ctx.fillStyle = '#b48cff'; ctx.beginPath(); ctx.arc(18 + i * 20, 40, 6, 0, 7); ctx.fill(); }
      // счёт
      ctx.fillStyle = '#fff'; ctx.font = 'bold 16px ' + FONT; ctx.textAlign = 'right';
      ctx.fillText(String(engine.score), W - 14, 20);
      // уровень оружия + круг сложности
      ctx.font = 'bold 11px ' + FONT;
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.fillText('PWR ' + (p.lvl + 1) + (loopN ? '  ЦИКЛ ' + (loopN + 1) : ''), W - 14, 40);
      // кнопки
      btns.forEach(b => {
        ctx.fillStyle = 'rgba(255,255,255,0.16)';
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 7); ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1.5; ctx.stroke();
        ctx.fillStyle = b.id === 'pol' ? PCOL[p.pol] : 'rgba(255,255,255,0.85)';
        ctx.font = 'bold ' + Math.round(b.r * 0.85) + 'px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(b.glyph, b.x, b.y + 1);
      });
      if (time < 3) {
        ctx.fillStyle = 'rgba(255,255,255,0.75)'; ctx.font = 'bold 14px ' + FONT; ctx.textAlign = 'center';
        ctx.fillText(LB.hint || 'Веди пальцем · ✦ бомба' + (POLAR ? ' · ⇄ цвет' : ''), W / 2, H * 0.3);
      }
    },

    key: function (k) {
      if (k === 'x' || k === 'X') useBomb();
      if (POLAR && (k === 'c' || k === 'C' || k === 'z' || k === 'Z')) p.pol = 1 - p.pol;
    },
    pointerDown: function (pt) {
      for (let i = 0; i < btns.length; i++) {
        const b = btns[i];
        if ((pt.x - b.x) * (pt.x - b.x) + (pt.y - b.y) * (pt.y - b.y) < b.r * b.r * 1.4) {
          if (b.id === 'bomb') useBomb(); else if (b.id === 'pol') p.pol = 1 - p.pol;
          return;
        }
      }
      target = { x: pt.x, y: pt.y - 60 };   // корабль чуть выше пальца
    },
    pointerMove: function (pt) { if (target) target = { x: pt.x, y: pt.y - 60 }; },
    pointerUp: function () { target = null; },

    _state: function () {
      return { hp: p.hp, bombs: p.bombs, lvl: p.lvl, pol: p.pol, x: p.x, y: p.y,
        foes: foes.length, eb: eb.length, pb: pb.length, drops: drops.length,
        loopN: loopN, waveIdx: waveIdx, inv: p.inv };
    },
    _spawnBullet: function (x, y, vx, vy, pol) { eb.push({ x: x, y: y, vx: vx, vy: vy, pol: pol || 0, grazed: false }); },
    _spawnDrop: function (x, y, kind) { drops.push({ x: x, y: y, kind: kind, t: 0 }); },
    _setPos: function (x, y) { p.x = x; p.y = y; },
  };
});

Engine.boot(CONFIG);
</script></body></html>
